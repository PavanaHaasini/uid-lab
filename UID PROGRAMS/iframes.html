<!DOCTYPE html>
<html>
    <head>
        <title>Amrita Company Portal</title>
    </head>

    <body bgcolor="#F2F4F4">

        <!-- Header -->
        <center>
            <h2>
                <font color="#1B4F72">
                    AMRITA COMPANY PORTAL
                </font>
            </h2>
            <hr width="70%">
        </center>

        <br><br>

        <!-- Side by Side Forms -->
        <table width="80%" align="center" cellpadding="20">
            <tr valign="top">

                <!-- Login Form -->
                <td align="center" width="50%">

                    <iframe
                        width="100%"
                        height="400"
                        frameborder="1"
                        srcdoc='
                            <html>
                                <body bgcolor="#EBF5FB">
                                    <center>
                                        <h3>
                                            <font color="#154360">
                                                Login Form
                                            </font>
                                        </h3>
                                        <hr width="60%">

                                        <form>
                                            Username:<br>
                                            <input type="text" size="25"><br><br>

                                            Password:<br>
                                            <input type="password" size="25"><br><br>

                                            <input type="submit" value="Login">
                                            <input type="reset" value="Clear">
                                        </form>
                                    </center>
                                </body>
                            </html>
                        '>
                    </iframe>

                </td>

                <!-- Registration Form -->
                <td align="center" width="50%">

                    <iframe
                        width="100%"
                        height="400"
                        frameborder="1"
                        srcdoc='
                            <html>
                                <body bgcolor="#E8F8F5">
                                    <center>
                                        <h3>
                                            <font color="#196F3D">
                                                Registration Form
                                            </font>
                                        </h3>
                                        <hr width="60%">

                                        <form>
                                            Full Name:<br>
                                            <input type="text" size="25"><br><br>

                                            Email:<br>
                                            <input type="email" size="25"><br><br>

                                            Password:<br>
                                            <input type="password" size="25"><br><br>

                                            Confirm Password:<br>
                                            <input type="password" size="25"><br><br>

                                            <input type="submit" value="Register">
                                            <input type="reset" value="Clear">
                                        </form>
                                    </center>
                                </body>
                            </html>
                        '>
                    </iframe>

                </td>

            </tr>
        </table>

        <br><br>
        <hr width="70%">

        <!-- Footer -->
        <center>
            <font size="2" color="gray">
                © 2026 ABC Company

               <p><b>L. Pavana Haasini
                CSE25033</b></p>
            </font>
        </center>

    </body>
</html>
