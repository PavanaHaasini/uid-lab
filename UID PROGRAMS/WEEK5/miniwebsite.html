<!DOCTYPE html>
<html>
<head>
    <title>Mini Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .nav {
            background-color: #34495e;
            text-align: center;
            padding: 10px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav a:hover {
            color: yellow;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }
    </style>

    <script>
        function loadPage(page) {
            var frame = document.getElementById("contentFrame");

            if (page == "home") {
                frame.srcdoc = `
                <body bgcolor="lightblue">
                    <h2 align="center">Welcome to My Mini Website</h2>
                    <p align="center">
                        This mini website demonstrates basic web development
                        concepts using HTML, CSS, JavaScript, and iframe navigation.
                    </p>
                    <p align="center">
                        It is designed as a simple academic project to understand
                        dynamic content loading within a single webpage layout.
                    </p>
                    <p align="center">
                        Use the navigation menu above to explore more sections.
                    </p>
                </body>`;
            }

            if (page == "about") {
                frame.srcdoc = `
                <body bgcolor="lightgreen">
                    <h2 align="center">About This Project</h2>
                    <p align="center">
                        This website is created to showcase how multiple pages
                        can be displayed inside an iframe without reloading
                        the entire webpage.
                    </p>
                    <p align="center">
                        The project focuses on clean structure, proper alignment,
                        and simple interactive navigation using JavaScript.
                    </p>
                    <p align="center">
                        It reflects basic web design principles and layout management.
                    </p>
                </body>`;
            }

            if (page == "contact") {
                frame.srcdoc = `
                <body bgcolor="lightyellow">
                    <h2 align="center">Contact Information</h2>
                    <p align="center">
                        If you have any questions or feedback regarding this project,
                        feel free to reach out.
                    </p>
                    <p align="center">
                        Email: Haasini@example.com
                    </p>
                    <p align="center">
                        Phone: +91 25033
                    </p>
                    <p align="center">
                        Thank you for visiting this mini website.
                    </p>
                </body>`;
            }
        }
    </script>

</head>

<body onload="loadPage('home')">

    <div class="header">
        <h1>My Mini Website</h1>
    </div>

    <div class="nav">
        <a onclick="loadPage('home')">Home</a>
        <a onclick="loadPage('about')">About</a>
        <a onclick="loadPage('contact')">Contact</a>
    </div>

    <iframe id="contentFrame"></iframe>

</body>
</html>
